<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Success</title>
    <script>
        // Parse the URL for the OAuth token
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        // Redirect to the dashboard after handling the token
        if (token) {
            // Handle the token (e.g., save to local storage or send to your server)
            localStorage.setItem('oauthToken', token);

            // Redirect to the dashboard
            window.location.href = '/dashboard';
        } else {
            // Handle the error if no token is present
            document.body.innerHTML = '<h1>Error: Invalid token</h1>';
        }
    </script>
</head>
<body>
    <h1>OAuth Token Handling</h1>
    <p>Redirecting you to the dashboard...</p>
</body>
</html>
